<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>PipPop</title>
    <meta property="og:title" content="PipPop">
    <meta property="og:description" content="A bubble physics game.">
    <meta property="og:image" content="https://scidomino.github.io/pippop/og-image.png">
    <meta property="og:image:width" content="1246">
    <meta property="og:image:height" content="930">
    <meta property="og:url" content="https://scidomino.github.io/pippop/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="PipPop">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        html, body, canvas {
            margin: 0px;
            padding: 0px;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
            z-index: 0;
            touch-action: none;
        }
    </style>
</head>
<body>
    <canvas id="glcanvas"></canvas>
    <script src="mq_js_bundle.js"></script>
    <script src="sapp_jsutils.js"></script>
    <script src="quad-storage.js"></script>
    <script>
        load("pippop.wasm");

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered', reg))
                    .catch(err => console.log('Service Worker registration failed', err));
            });
        }

        // Fullscreen on double tap
        let lastTap = 0;
        document.addEventListener('touchend', function (event) {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 500 && tapLength > 0) {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.log(`Error attempting to enable full-screen mode: ${err.message}`);
                    });
                }
                event.preventDefault();
            }
            lastTap = currentTime;
        });
    </script>
</body>
</html>
